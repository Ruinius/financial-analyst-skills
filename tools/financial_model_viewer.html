<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DCF Model Viewer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-base: #0a0a0f;
        --bg-primary: #12121a;
        --bg-secondary: #1a1a2e;
        --bg-card: #16162a;
        --border: #2a2a4a;
        --border-focus: #6366f1;
        --text-primary: #e2e8f0;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --accent: #6366f1;
        --accent-glow: rgba(99, 102, 241, 0.15);
        --green: #22c55e;
        --green-bg: rgba(34, 197, 94, 0.1);
        --red: #ef4444;
        --red-bg: rgba(239, 68, 68, 0.1);
        --gold: #f59e0b;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background: var(--bg-base);
        color: var(--text-primary);
        line-height: 1.6;
        min-height: 100vh;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 2rem;
      }

      /* Header */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--border);
      }
      .header h1 {
        font-size: 1.5rem;
        font-weight: 700;
      }
      .header h1 span {
        color: var(--accent);
      }
      .header-meta {
        text-align: right;
        color: var(--text-secondary);
        font-size: 0.85rem;
      }
      .header-meta .ticker {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text-primary);
      }

      /* Cards */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .card-title {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-secondary);
        margin-bottom: 1rem;
        font-weight: 600;
      }

      /* Assumption Grid */
      .assumptions-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1.5rem;
      }
      .assumption-group h4 {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--accent);
        margin-bottom: 0.75rem;
        font-weight: 600;
      }
      .assumption-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
      }
      .assumption-row label {
        color: var(--text-secondary);
      }
      .assumption-row input {
        width: 80px;
        padding: 0.3rem 0.5rem;
        text-align: right;
        background: var(--bg-primary);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-primary);
        font-family: inherit;
        font-size: 0.875rem;
        transition: border-color 0.2s;
      }
      .assumption-row input:focus {
        outline: none;
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }
      .assumption-row input.readonly {
        background: var(--bg-base);
        color: var(--text-muted);
        cursor: default;
        border-color: transparent;
      }

      /* Buttons */
      .btn-row {
        display: flex;
        gap: 0.75rem;
        margin-top: 1.25rem;
        flex-wrap: wrap;
      }
      .btn {
        padding: 0.5rem 1.25rem;
        border-radius: 8px;
        border: none;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-primary {
        background: var(--accent);
        color: white;
      }
      .btn-primary:hover {
        filter: brightness(1.15);
        transform: translateY(-1px);
      }
      .btn-secondary {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover {
        border-color: var(--text-secondary);
        color: var(--text-primary);
      }
      .btn-save {
        background: transparent;
        color: var(--gold);
        border: 1px solid rgba(245, 158, 11, 0.3);
      }
      .btn-save:hover {
        border-color: var(--gold);
        background: rgba(245, 158, 11, 0.05);
      }

      /* DCF Table */
      .table-container {
        overflow-x: auto;
        margin: 0 -0.5rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8rem;
        white-space: nowrap;
      }
      th,
      td {
        padding: 0.5rem 0.75rem;
        text-align: right;
      }
      th {
        color: var(--text-muted);
        font-weight: 600;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: var(--bg-card);
      }
      th:first-child,
      td:first-child {
        text-align: left;
        position: sticky;
        left: 0;
        background: var(--bg-card);
        z-index: 1;
      }
      td {
        border-bottom: 1px solid rgba(42, 42, 74, 0.4);
      }
      tr:hover td {
        background: rgba(99, 102, 241, 0.03);
      }
      .row-highlight td {
        font-weight: 600;
      }
      .val-positive {
        color: var(--green);
      }
      .val-negative {
        color: var(--red);
      }
      td.base-col {
        color: var(--text-muted);
      }
      td.terminal-col {
        color: var(--gold);
        font-weight: 500;
      }

      /* Valuation Summary */
      .valuation-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
      }
      @media (max-width: 768px) {
        .valuation-grid {
          grid-template-columns: 1fr;
        }
      }
      .val-table {
        width: 100%;
      }
      .val-table td {
        padding: 0.5rem 0;
        border-bottom: 1px solid rgba(42, 42, 74, 0.3);
      }
      .val-table td:first-child {
        color: var(--text-secondary);
        font-size: 0.85rem;
      }
      .val-table td:last-child {
        text-align: right;
        font-weight: 500;
      }
      .val-table tr.total td {
        font-weight: 700;
        font-size: 1rem;
        border-top: 2px solid var(--border);
        padding-top: 0.75rem;
      }
      .val-table tr.total td:last-child {
        color: var(--accent);
      }

      /* Upside badge */
      .upside-badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        font-weight: 700;
        font-size: 1.1rem;
      }
      .upside-badge.positive {
        background: var(--green-bg);
        color: var(--green);
      }
      .upside-badge.negative {
        background: var(--red-bg);
        color: var(--red);
      }

      /* Scenarios */
      .scenario-input {
        padding: 0.4rem 0.75rem;
        background: var(--bg-primary);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-primary);
        font-family: inherit;
        font-size: 0.85rem;
        width: 200px;
      }
      .scenario-input:focus {
        outline: none;
        border-color: var(--border-focus);
      }
      .scenarios-list {
        margin-top: 1rem;
      }
      .scenario-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.6rem 0;
        border-bottom: 1px solid rgba(42, 42, 74, 0.3);
        font-size: 0.85rem;
      }
      .scenario-item .name {
        color: var(--text-primary);
        font-weight: 500;
      }
      .scenario-item .meta {
        color: var(--text-muted);
      }

      /* Loading */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        font-size: 1.1rem;
        color: var(--text-muted);
      }
      .error {
        color: var(--red);
        text-align: center;
        padding: 3rem;
      }
    </style>
  </head>
  <body>
    <div class="container" id="app">
      <div class="loading" id="loading">Loading model data...</div>
    </div>

    <script>
      // ═══════════════════════════════════════════════════════════════════════════
      // STATE
      // ═══════════════════════════════════════════════════════════════════════════
      let MODEL = null; // Original JSON (immutable reference)
      let assumptions = {}; // Current editable assumptions
      let scenarios = []; // Saved scenarios

      // ═══════════════════════════════════════════════════════════════════════════
      // DATA LOADING
      // ═══════════════════════════════════════════════════════════════════════════
      async function loadModel() {
        const params = new URLSearchParams(window.location.search);
        const ticker = params.get("ticker");
        if (!ticker) {
          document.getElementById("app").innerHTML =
            '<div class="error">No ticker specified. Use ?ticker=ADBE</div>';
          return;
        }

        try {
          const resp = await fetch(
            `/output_data/${ticker}/${ticker}_financial_model.json`,
          );
          if (!resp.ok)
            throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
          MODEL = await resp.json();

          // Initialize editable assumptions from model defaults
          assumptions = { ...MODEL.assumptions, wacc: MODEL.wacc.wacc };

          // Load saved scenarios
          try {
            const sResp = await fetch(
              `/output_data/${ticker}/${ticker}_scenarios.json`,
            );
            if (sResp.ok) scenarios = await sResp.json();
          } catch (e) {
            /* no scenarios yet */
          }

          render();
        } catch (e) {
          document.getElementById("app").innerHTML =
            `<div class="error">Failed to load model: ${e.message}</div>`;
        }
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // DCF CALCULATION ENGINE (mirrors Python logic)
      // ═══════════════════════════════════════════════════════════════════════════
      function calculateDCF(a) {
        const wacc = a.wacc;
        const tax = a.adjusted_tax_rate;
        const g1 = a.revenue_growth_stage1;
        const g2 = a.revenue_growth_stage2;
        const gt = a.revenue_growth_terminal;
        const m1 = a.ebita_margin_stage1;
        const m2 = a.ebita_margin_stage2;
        const mt = a.ebita_margin_terminal;
        const mct1 = a.marginal_capital_turnover_stage1;
        const mct2 = a.marginal_capital_turnover_stage2;
        const mctt = a.marginal_capital_turnover_terminal;

        let currentRevenue = a.base_revenue;
        let currentIC = a.base_invested_capital;

        const projections = [];

        for (let year = 1; year <= 10; year++) {
          let growth, margin, mct;
          if (year <= 5) {
            growth = g1 + ((g2 - g1) / 5) * (year - 1);
            margin = m1 + ((m2 - m1) / 5) * (year - 1);
            mct = mct1;
          } else {
            growth = g2 + ((gt - g2) / 5) * (year - 6);
            margin = m2 + ((mt - m2) / 5) * (year - 6);
            mct = mct2;
          }

          const prevRevenue = currentRevenue;
          currentRevenue = prevRevenue * (1 + growth);
          const deltaRevenue = currentRevenue - prevRevenue;
          const ebita = currentRevenue * margin;
          const nopat = ebita * (1 - tax);
          const deltaIC = mct !== 0 ? deltaRevenue / mct : 0;
          currentIC += deltaIC;
          const fcf = nopat - deltaIC;
          const df = 1 / Math.pow(1 + wacc, year - 0.5);
          const pvFcf = fcf * df;
          const roic = currentIC !== 0 ? nopat / currentIC : 0;

          projections.push({
            year,
            revenue: currentRevenue,
            growth_rate: growth,
            ebita,
            margin,
            nopat,
            invested_capital: currentIC,
            delta_ic: deltaIC,
            roic,
            fcf,
            discount_factor: df,
            pv_fcf: pvFcf,
          });
        }

        // Terminal
        const revTerminal = currentRevenue * (1 + gt);
        const ebitaTerminal = revTerminal * mt;
        const nopatTerminal = ebitaTerminal * (1 - tax);
        const ronic = mt * (1 - tax) * mctt;
        const reinvestRate = ronic !== 0 ? gt / ronic : 0;
        const fcfTerminal = nopatTerminal * (1 - reinvestRate);
        const effectiveGt = wacc - gt <= 0 ? wacc - 0.01 : gt;
        const terminalValue = fcfTerminal / (wacc - effectiveGt);
        const dfTV = 1 / Math.pow(1 + wacc, 10 - 0.5);
        const pvTerminal = terminalValue * dfTV;
        const netInvest = nopatTerminal * reinvestRate;
        const icTerminal = currentIC + netInvest;
        const roicTerminal = icTerminal !== 0 ? nopatTerminal / icTerminal : 0;

        const sumPV = projections.reduce((s, p) => s + p.pv_fcf, 0);
        const ev = sumPV + pvTerminal;

        // Bridge
        const v = MODEL.valuation;
        const cash =
          (v.cash_and_equivalents || 0) + (v.short_term_investments || 0);
        const lti = v.long_term_investments || 0;
        const debt = v.total_debt || 0;
        const equityValue = ev - debt + cash + lti;
        const shares = v.diluted_shares || 1;
        const ivPerShare = equityValue / shares;
        const currentPrice = v.current_price || 0;
        const upside =
          currentPrice > 0 ? (ivPerShare / currentPrice - 1) * 100 : 0;

        return {
          projections,
          sumPV,
          pvTerminal,
          ev,
          equityValue,
          ivPerShare,
          upside,
          terminal: {
            revenue: revTerminal,
            growth_rate: gt,
            ebita: ebitaTerminal,
            margin: mt,
            nopat: nopatTerminal,
            invested_capital: icTerminal,
            roic: roicTerminal,
            ronic,
            reinvestRate,
            fcfTerminal,
            terminalValue,
            df: dfTV,
            pvTerminal,
          },
          cash,
          lti,
          debt,
          shares,
          currentPrice,
        };
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // FORMATTING
      // ═══════════════════════════════════════════════════════════════════════════
      const fmt = (v) =>
        v == null ? "—" : Math.round(v).toLocaleString("en-US");
      const fmtPct = (v) => (v == null ? "—" : (v * 100).toFixed(1) + "%");
      const fmtDec = (v) => (v == null ? "—" : v.toFixed(4));
      const fmtCur = (v, sym = "$") =>
        v == null ? "—" : sym + Math.round(v).toLocaleString("en-US");
      const fmtPrice = (v, sym = "$") => (v == null ? "—" : sym + v.toFixed(2));
      const fmtRoic = (v) => {
        if (v == null) return "—";
        if (v < -1) return "neg";
        if (v > 1) return ">100%";
        return fmtPct(v);
      };

      // ═══════════════════════════════════════════════════════════════════════════
      // RENDER
      // ═══════════════════════════════════════════════════════════════════════════
      function render() {
        const dcf = calculateDCF(assumptions);
        const m = MODEL;
        const v = m.valuation;
        const unit = m.unit || "millions";
        const unitLabel =
          unit === "millions" ? "M" : unit === "billions" ? "B" : "";
        const curr = m.currency || "USD";
        const sym = curr === "USD" ? "$" : curr === "RMB" ? "¥" : curr;
        const ticker = m.ticker;

        // Base year data
        const baseProj = m.projections[0]; // "Base" row

        const upsideClass = dcf.upside >= 0 ? "positive" : "negative";
        const upsideSign = dcf.upside >= 0 ? "+" : "";

        // Projection rows for the table
        const projRows = [
          "revenue",
          "growth_rate",
          "ebita",
          "margin",
          "nopat",
          "invested_capital",
          "fcf",
          "discount_factor",
          "pv_fcf",
        ];
        const rowLabels = {
          revenue: "Revenue",
          growth_rate: "Growth",
          ebita: "EBITA",
          margin: "EBITA Margin",
          nopat: "NOPAT",
          invested_capital: "Invested Capital",
          fcf: "Free Cash Flow",
          discount_factor: "Discount Factor",
          pv_fcf: "Present Value",
        };
        const rowFormatters = {
          revenue: fmt,
          growth_rate: fmtPct,
          ebita: fmt,
          margin: fmtPct,
          nopat: fmt,
          invested_capital: fmt,
          fcf: fmt,
          discount_factor: fmtDec,
          pv_fcf: fmt,
        };
        const terminalFormatters = {
          revenue: fmt,
          growth_rate: fmtPct,
          ebita: fmt,
          margin: fmtPct,
          nopat: fmt,
          invested_capital: fmt,
          fcf: (v) => fmt(dcf.terminal.terminalValue),
          discount_factor: (v) => fmtDec(dcf.terminal.df),
          pv_fcf: (v) => fmt(dcf.terminal.pvTerminal),
        };
        const terminalValues = {
          revenue: dcf.terminal.revenue,
          growth_rate: dcf.terminal.growth_rate,
          ebita: dcf.terminal.ebita,
          margin: dcf.terminal.margin,
          nopat: dcf.terminal.nopat,
          invested_capital: dcf.terminal.invested_capital,
          fcf: dcf.terminal.terminalValue,
          discount_factor: dcf.terminal.df,
          pv_fcf: dcf.terminal.pvTerminal,
        };

        let tableRows = "";
        for (const key of projRows) {
          const label = rowLabels[key];
          const formatter = rowFormatters[key];
          const baseVal =
            key === "growth_rate" ||
            key === "fcf" ||
            key === "discount_factor" ||
            key === "pv_fcf"
              ? "—"
              : formatter(baseProj[key]);

          let cells = `<td class="base-col">${baseVal}</td>`;
          for (const p of dcf.projections) {
            cells += `<td>${formatter(p[key])}</td>`;
          }
          const tFmt = terminalFormatters[key];
          cells += `<td class="terminal-col">${tFmt(terminalValues[key])}</td>`;

          const highlight =
            key === "pv_fcf" || key === "fcf" ? ' class="row-highlight"' : "";
          tableRows += `<tr${highlight}><td>${label}</td>${cells}</tr>`;
        }

        const tvPctOfEV =
          dcf.ev > 0 ? ((dcf.pvTerminal / dcf.ev) * 100).toFixed(1) : "—";

        document.getElementById("app").innerHTML = `
    <div class="header">
      <h1><span>${ticker}</span> DCF Model</h1>
      <div class="header-meta">
        <div class="ticker">${m.company_name}</div>
        <div>${curr} ${unit} | Generated ${m.generated_date}</div>
      </div>
    </div>

    <!-- ASSUMPTIONS -->
    <div class="card">
      <div class="card-title">Assumptions</div>
      <div class="assumptions-grid">
        <div class="assumption-group">
          <h4>Revenue Growth</h4>
          <div class="assumption-row"><label>Stage 1 (Y1-5)</label>
            <input type="text" id="a_g1" value="${(assumptions.revenue_growth_stage1 * 100).toFixed(1)}%" data-key="revenue_growth_stage1" data-pct="1"></div>
          <div class="assumption-row"><label>Stage 2 (Y6-10)</label>
            <input type="text" id="a_g2" value="${(assumptions.revenue_growth_stage2 * 100).toFixed(1)}%" data-key="revenue_growth_stage2" data-pct="1"></div>
          <div class="assumption-row"><label>Terminal</label>
            <input type="text" id="a_gt" value="${(assumptions.revenue_growth_terminal * 100).toFixed(1)}%" data-key="revenue_growth_terminal" data-pct="1"></div>
        </div>
        <div class="assumption-group">
          <h4>EBITA Margin</h4>
          <div class="assumption-row"><label>Stage 1 (Y1-5)</label>
            <input type="text" id="a_m1" value="${(assumptions.ebita_margin_stage1 * 100).toFixed(1)}%" data-key="ebita_margin_stage1" data-pct="1"></div>
          <div class="assumption-row"><label>Stage 2 (Y6-10)</label>
            <input type="text" id="a_m2" value="${(assumptions.ebita_margin_stage2 * 100).toFixed(1)}%" data-key="ebita_margin_stage2" data-pct="1"></div>
          <div class="assumption-row"><label>Terminal</label>
            <input type="text" id="a_mt" value="${(assumptions.ebita_margin_terminal * 100).toFixed(1)}%" data-key="ebita_margin_terminal" data-pct="1"></div>
        </div>
        <div class="assumption-group">
          <h4>Capital Turnover</h4>
          <div class="assumption-row"><label>Stage 1</label>
            <input type="text" id="a_mct1" value="${assumptions.marginal_capital_turnover_stage1.toFixed(1)}" data-key="marginal_capital_turnover_stage1"></div>
          <div class="assumption-row"><label>Stage 2</label>
            <input type="text" id="a_mct2" value="${assumptions.marginal_capital_turnover_stage2.toFixed(1)}" data-key="marginal_capital_turnover_stage2"></div>
          <div class="assumption-row"><label>Terminal</label>
            <input type="text" id="a_mctt" value="${assumptions.marginal_capital_turnover_terminal.toFixed(1)}" data-key="marginal_capital_turnover_terminal"></div>
        </div>
        <div class="assumption-group">
          <h4>WACC & Tax</h4>
          <div class="assumption-row"><label>WACC</label>
            <input type="text" id="a_wacc" value="${(assumptions.wacc * 100).toFixed(1)}%" data-key="wacc" data-pct="1"></div>
          <div class="assumption-row"><label>Tax Rate</label>
            <input type="text" id="a_tax" value="${(assumptions.adjusted_tax_rate * 100).toFixed(1)}%" data-key="adjusted_tax_rate" data-pct="1"></div>
          <div class="assumption-row"><label>Base Revenue</label>
            <input type="text" value="${fmt(assumptions.base_revenue)}" class="readonly" readonly></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="recalculate()">Recalculate</button>
        <button class="btn btn-secondary" onclick="resetDefaults()">Reset to Defaults</button>
        <div style="flex:1"></div>
        <input type="text" id="scenario-name" class="scenario-input" placeholder="Scenario name...">
        <button class="btn btn-save" onclick="saveScenario()">Save Scenario</button>
      </div>
    </div>

    <!-- DCF TABLE -->
    <div class="card">
      <div class="card-title">Discounted Cash Flow Model</div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th></th><th>Base</th>
              ${dcf.projections.map((p) => `<th>Yr ${p.year}</th>`).join("")}
              <th>Terminal</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>

    <!-- VALUATION -->
    <div class="card">
      <div class="card-title">Valuation</div>
      <div class="valuation-grid">
        <div>
          <table class="val-table">
            <tr><td>Sum PV of FCF (Yr 1-10)</td><td>${sym}${fmt(dcf.sumPV)}${unitLabel}</td></tr>
            <tr><td>PV of Terminal Value</td><td>${sym}${fmt(dcf.pvTerminal)}${unitLabel}</td></tr>
            <tr><td style="color:var(--text-muted);font-size:0.8rem">Terminal as % of EV</td><td style="font-size:0.8rem">${tvPctOfEV}%</td></tr>
            <tr class="total"><td>Enterprise Value</td><td>${sym}${fmt(dcf.ev)}${unitLabel}</td></tr>
            <tr><td>(+) Cash & Short-Term Investments</td><td>${sym}${fmt(dcf.cash)}${unitLabel}</td></tr>
            <tr><td>(+) Long-Term Investments</td><td>${sym}${fmt(dcf.lti)}${unitLabel}</td></tr>
            <tr><td>(-) Total Debt</td><td>${sym}${fmt(dcf.debt)}${unitLabel}</td></tr>
            <tr class="total"><td>Equity Value</td><td>${sym}${fmt(dcf.equityValue)}${unitLabel}</td></tr>
            <tr><td>Diluted Shares</td><td>${fmt(dcf.shares)}${unitLabel}</td></tr>
          </table>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;">
          <div style="text-align:center">
            <div style="color:var(--text-muted);font-size:0.8rem;margin-bottom:0.25rem">Intrinsic Value / Share</div>
            <div style="font-size:2rem;font-weight:700;color:var(--accent)">${fmtPrice(dcf.ivPerShare, sym)}</div>
          </div>
          <div style="text-align:center">
            <div style="color:var(--text-muted);font-size:0.8rem;margin-bottom:0.25rem">Current Price</div>
            <div style="font-size:1.25rem;font-weight:500">${fmtPrice(dcf.currentPrice, sym)}</div>
          </div>
          <div class="upside-badge ${upsideClass}">${upsideSign}${dcf.upside.toFixed(1)}%</div>
          <div style="color:var(--text-muted);font-size:0.75rem">
            RONIC: ${fmtPct(dcf.terminal.ronic)} | Reinvestment: ${fmtPct(dcf.terminal.reinvestRate)}
          </div>
        </div>
      </div>
    </div>

    <!-- SCENARIOS -->
    ${
      scenarios.length > 0
        ? `
    <div class="card">
      <div class="card-title">Saved Scenarios</div>
      <div class="scenarios-list">
        ${scenarios
          .map(
            (s) => `
          <div class="scenario-item">
            <span class="name">${s.name || "Unnamed"}</span>
            <span class="meta">${s.date || ""}</span>
            <span style="font-weight:600;${s.upside_pct >= 0 ? "color:var(--green)" : "color:var(--red)"}">${fmtPrice(s.iv_per_share, sym)} (${s.upside_pct >= 0 ? "+" : ""}${s.upside_pct.toFixed(1)}%)</span>
          </div>
        `,
          )
          .join("")}
      </div>
    </div>`
        : ""
    }

    <!-- WACC DETAIL -->
    <div class="card">
      <div class="card-title">WACC Detail</div>
      <div class="valuation-grid">
        <table class="val-table">
          <tr><td>Raw Levered Beta</td><td>${MODEL.wacc.beta_levered}</td></tr>
          <tr><td>Unlevered Beta (Hamada)</td><td>${MODEL.wacc.beta_unlevered.toFixed(4)}</td></tr>
          <tr><td>Adjusted Beta (Blume's)</td><td>${MODEL.wacc.beta_adjusted.toFixed(4)}</td></tr>
          <tr><td>Risk-Free Rate</td><td>${fmtPct(MODEL.wacc.risk_free_rate)}</td></tr>
          <tr><td>Equity Risk Premium</td><td>${fmtPct(MODEL.wacc.equity_risk_premium)}</td></tr>
          <tr><td>Cost of Equity</td><td>${fmtPct(MODEL.wacc.cost_of_equity)}</td></tr>
        </table>
        <table class="val-table">
          <tr><td>Cost of Debt</td><td>${fmtPct(MODEL.wacc.cost_of_debt)}</td></tr>
          <tr><td>Weight of Equity</td><td>${fmtPct(MODEL.wacc.weight_equity)}</td></tr>
          <tr><td>Weight of Debt</td><td>${fmtPct(MODEL.wacc.weight_debt)}</td></tr>
          <tr><td>Statutory Tax Rate</td><td>${fmtPct(MODEL.wacc.tax_rate)}</td></tr>
          <tr class="total"><td>Calculated WACC</td><td>${fmtPct(MODEL.wacc.wacc_calculated)}</td></tr>
          <tr><td>Bounded WACC (7-11%)</td><td>${fmtPct(MODEL.wacc.wacc)}</td></tr>
        </table>
      </div>
    </div>
  `;

        // Attach input event listeners
        document
          .querySelectorAll(".assumption-row input:not(.readonly)")
          .forEach((input) => {
            input.addEventListener("focus", function () {
              const isPct = this.dataset.pct === "1";
              const key = this.dataset.key;
              if (isPct) {
                this.value = (assumptions[key] * 100).toFixed(1);
              } else {
                this.value = assumptions[key];
              }
              this.select();
            });
            input.addEventListener("blur", function () {
              const isPct = this.dataset.pct === "1";
              const key = this.dataset.key;
              let val = parseFloat(this.value.replace(/[%,]/g, ""));
              if (isNaN(val)) {
                // Revert
                val = isPct ? assumptions[key] * 100 : assumptions[key];
              }
              if (isPct) {
                assumptions[key] = val / 100;
                this.value = val.toFixed(1) + "%";
              } else {
                assumptions[key] = val;
                this.value = val.toFixed(1);
              }
            });
            input.addEventListener("keydown", function (e) {
              if (e.key === "Enter") this.blur();
            });
          });
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // ACTIONS
      // ═══════════════════════════════════════════════════════════════════════════
      function recalculate() {
        render();
      }

      function resetDefaults() {
        assumptions = { ...MODEL.assumptions, wacc: MODEL.wacc.wacc };
        render();
      }

      async function saveScenario() {
        const nameInput = document.getElementById("scenario-name");
        const name = nameInput ? nameInput.value.trim() : "";
        if (!name) {
          alert("Enter a scenario name");
          return;
        }

        const dcf = calculateDCF(assumptions);
        const scenario = {
          name,
          date: new Date().toISOString().split("T")[0],
          assumptions: { ...assumptions },
          iv_per_share: Math.round(dcf.ivPerShare * 100) / 100,
          enterprise_value: Math.round(dcf.ev),
          equity_value: Math.round(dcf.equityValue),
          current_price: dcf.currentPrice,
          upside_pct: Math.round(dcf.upside * 10) / 10,
        };

        try {
          const resp = await fetch("/api/save-scenario", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ticker: MODEL.ticker, scenario }),
          });
          if (resp.ok) {
            scenarios.push(scenario);
            nameInput.value = "";
            render();
          } else {
            alert("Failed to save scenario");
          }
        } catch (e) {
          alert("Server error: " + e.message);
        }
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // INIT
      // ═══════════════════════════════════════════════════════════════════════════
      loadModel();
    </script>
  </body>
</html>
